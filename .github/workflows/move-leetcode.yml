name: Move LeetCode Solutions

on:
  workflow_dispatch:  # 수동 실행
  push:
    paths:
      - '[0-9][0-9][0-9][0-9]-*/**'  # 이 패턴의 파일이 들어올 때만 실행

jobs:
  move-files:
    runs-on: ubuntu-latest
    # [중요] 봇이 push할 때 다시 이 워크플로우가 실행되는 '무한 루프' 방지
    if: github.actor != 'github-actions[bot]' 
    
    steps:
      - name: Checkout repository
        # v3 대신 최신 v4를 사용하여 Node.js 경고 해결
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 전체 기록을 가져와야 push 시 충돌이 적습니다

      - name: Move LeetCode solutions
        run: |
          mkdir -p LeetCode
          
          found=0
          # nullglob을 설정해 패턴에 맞는 폴더가 없어도 에러가 나지 않게 함
          shopt -s nullglob
          for d in [0-9][0-9][0-9][0-9]-*; do
            if [ -d "$d" ]; then
              echo "Moving directory: $d"
              # 이미 해당 폴더가 LeetCode 안에 있다면 덮어쓰거나 무시
              cp -r "$d" LeetCode/
              rm -rf "$d"
              found=1
            fi
          done
          
          if [ $found -eq 0 ]; then
            echo "No matching directories found to move"
          fi

      - name: Commit & Push changes
        run: |
          if git status --porcelain | grep .; then
            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'
            git add .
            git commit -m "chore: Move LeetCode solutions to LeetCode folder"
            git push
          else
            echo "No changes to commit"
          fi
